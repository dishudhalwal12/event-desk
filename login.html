<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventDesk | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <script type="module" src="js/firebase-config.js"></script>
</head>
<body data-page="login">
  <main class="auth-shell">
    <div class="container">
      <div class="row align-items-center min-vh-100 g-5">
        <div class="col-lg-6 d-none d-lg-block">
          <div class="auth-illustration-wrap">
            <img src="assets/images/hero.png" alt="Students celebrating" class="auth-img">
          </div>
        </div>
        <div class="col-lg-5 ms-lg-auto">
          <div class="card auth-card">
            <div class="card-body p-4 p-lg-5">
              <a href="index.html" class="eventdesk-logo d-inline-block mb-4">EventDesk</a>
              <h1 class="auth-title">Welcome back to campus! 🎉</h1>
              <p class="auth-subtitle">Sign in to manage your registrations, scans, and certificates.</p>
              <form id="loginForm" class="mt-4" novalidate>
                <div class="mb-3">
                  <label for="loginEmail" class="form-label">Email</label>
                  <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Password</label>
                  <div class="password-field">
                    <input type="password" id="loginPassword" class="form-control" required>
                    <button type="button" id="toggleLoginPassword" class="password-toggle">Show 👀</button>
                  </div>
                </div>
                <button id="loginSubmitButton" type="submit" class="btn btn-primary w-100 mt-3">Sign In →</button>
              </form>
              <div class="text-center text-muted my-3">or</div>
              <button id="loginWithGoogleButton" type="button" class="btn btn-outline-primary w-100">Continue with Google</button>
              <div class="auth-links mt-4">
                <button id="forgotPasswordButton" class="btn btn-link p-0">Forgot password? 🔑</button>
                <p class="mb-0">Don&apos;t have an account? <a href="signup.html">Sign Up</a></p>
              </div>
              <form id="passwordResetForm" class="d-none mt-4">
                <label for="resetEmail" class="form-label">Enter your email for a reset link</label>
                <input type="email" id="resetEmail" class="form-control mb-3">
                <button type="submit" class="btn btn-outline-primary w-100">Send Reset Link 📧</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { initLoginPage } from './js/auth.js';

    initLoginPage();
  </script>
</body>
</html>
