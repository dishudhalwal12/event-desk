<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventDesk | All Upcoming Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <script type="module" src="js/firebase-config.js"></script>
</head>
<body data-page="events">
  <nav class="navbar navbar-expand-lg sticky-top eventdesk-navbar">
    <div class="container">
      <a class="navbar-brand eventdesk-logo" href="index.html">EventDesk</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#eventsNav" aria-controls="eventsNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="eventsNav">
        <ul class="navbar-nav ms-auto gap-lg-3">
          <li class="nav-item"><a class="nav-link active" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="leaderboard.html">Leaderboard</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="btn btn-primary ms-lg-2" href="signup.html">Get Started 🙌</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="section-space pt-4">
    <div class="container">
      <div class="section-heading mb-4">
        <h1 class="page-title">All Upcoming Events 🎉</h1>
        <p>Filter by what you love. Register in seconds.</p>
      </div>

      <div class="search-shell mb-4">
        <span class="search-icon">🔍</span>
        <input type="search" id="eventSearchInput" class="form-control search-input" placeholder="Search events, workshops, fests…">
      </div>

      <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
        <div class="category-pills" id="categoryPills" role="tablist" aria-label="Event categories">
          <button class="btn btn-pill active" data-category="All">All ✨</button>
          <button class="btn btn-pill" data-category="Tech">Tech 🎓</button>
          <button class="btn btn-pill" data-category="Cultural">Cultural 🎭</button>
          <button class="btn btn-pill" data-category="Sports">Sports 🏏</button>
          <button class="btn btn-pill" data-category="Workshop">Workshop 🛠️</button>
          <button class="btn btn-pill" data-category="Other">Other 🎪</button>
        </div>
        <div class="sort-wrap">
          <label for="sortEvents" class="form-label mb-2 mb-lg-0 me-lg-2">Sort by:</label>
          <select id="sortEvents" class="form-select">
            <option value="date">Date</option>
            <option value="seats">Seats</option>
            <option value="popular">Popular</option>
          </select>
        </div>
      </div>

      <div id="eventsLoader" class="mb-4"></div>

      <section id="eventsGrid" class="row g-4" aria-live="polite"></section>

      <section id="eventsEmptyState" class="empty-state d-none">
        <img src="assets/images/hero.png" alt="No events found" class="empty-img">
        <h2>No events here yet! Check back soon. 👀</h2>
      </section>
    </div>
  </main>

  <template id="eventCardTemplate">
    <div class="col-md-6 col-xl-4">
      <article class="card event-card h-100 stagger-card">
        <div class="event-poster-wrap">
          <img src="assets/images/hero.png" alt="Event poster" class="event-poster">
          <span class="seat-badge">12 left</span>
        </div>
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-center gap-2 mb-3">
            <span class="badge badge-category">Workshop</span>
            <span class="badge badge-soft info-seats">48 / 60 seats taken</span>
          </div>
          <h3 class="event-title mb-2"></h3>
          <p class="event-meta mb-3"></p>
          <div class="seat-progress mb-2">
            <div class="seat-progress-fill"></div>
          </div>
          <p class="seat-progress-copy mb-3"></p>
          <div class="countdown-chip mb-4"></div>
          <div class="mt-auto">
            <a href="event-detail.html" class="btn btn-outline-primary w-100 view-details-btn">View Details 👀</a>
          </div>
        </div>
      </article>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { initEventsPage } from './js/events.js';

    initEventsPage();
  </script>
</body>
</html>
