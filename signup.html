<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventDesk | Sign Up</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="js/theme.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
</head>
<body data-page="signup">
  <main class="auth-shell">
    <div class="container">
      <div class="auth-topbar">
        <a href="index.html" class="eventdesk-logo">EventDesk</a>
        <button type="button" class="theme-toggle-inline" data-theme-toggle="true" aria-label="Toggle color theme"></button>
      </div>
      <div class="row align-items-center min-vh-100 g-5">
        <div class="col-lg-6 d-none d-lg-block">
          <div class="auth-illustration-wrap">
            <img src="assets/images/hero.png" alt="Students celebrating" class="auth-img">
          </div>
        </div>
        <div class="col-lg-5 ms-lg-auto">
          <div class="card auth-card">
            <div class="card-body p-4 p-lg-5">
              <div id="roleSelectionStep">
                <h1 class="auth-title text-center">Join EventDesk! 🎉</h1>
                <p class="auth-subtitle text-center">Tell us who you are first.</p>
                <div class="row g-3 mt-4">
                  <div class="col-sm-6">
                    <button type="button" class="role-card w-100" data-role="student">
                      <span class="role-emoji">🎓</span>
                      <strong>I&apos;m a Student</strong>
                      <small>Browse events, register, get certs</small>
                    </button>
                  </div>
                  <div class="col-sm-6">
                    <button type="button" class="role-card w-100" data-role="organizer">
                      <span class="role-emoji">🎤</span>
                      <strong>I&apos;m an Organizer</strong>
                      <small>Create events, scan QR, view stats</small>
                    </button>
                  </div>
                </div>
              </div>

              <div id="signupFormStep" class="d-none">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <span id="selectedRoleBadge" class="badge badge-category">Student 🎓</span>
                  <button type="button" id="changeRoleButton" class="btn btn-link p-0">Change role 🔄</button>
                </div>
                <form id="signupForm" novalidate>
                  <div class="mb-3">
                    <label for="signupName" class="form-label">Full Name</label>
                    <input type="text" id="signupName" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label for="signupEmail" class="form-label">Email</label>
                    <input type="email" id="signupEmail" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label for="signupPassword" class="form-label">Password</label>
                    <div class="password-field">
                      <input type="password" id="signupPassword" class="form-control" required>
                      <button type="button" id="toggleSignupPassword" class="password-toggle">Show 👀</button>
                    </div>
                  </div>
                  <button id="signupSubmitButton" type="submit" class="btn btn-primary w-100 mt-3">Create Account 🙌</button>
                </form>
                <div class="text-center text-muted my-3">or</div>
                <button id="signupWithGoogleButton" type="button" class="btn btn-outline-primary w-100">Continue with Google</button>
                <p class="auth-links mt-4 mb-0">Already have an account? <a href="login.html">Sign In</a></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module">
    import { initSignupPage } from './js/auth.js';

    initSignupPage();
  </script>
</body>
</html>
